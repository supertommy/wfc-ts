<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wfc-ts Visualizer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      color: #fff;
    }
    .controls {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    select, button, input {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 4px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    select {
      background: #2d2d44;
      color: #fff;
    }
    button {
      background: #4a4a6a;
      color: #fff;
      transition: background 0.2s;
    }
    button:hover { background: #5a5a7a; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.primary { background: #4a7a4a; }
    button.primary:hover { background: #5a8a5a; }
    button.danger { background: #7a4a4a; }
    button.danger:hover { background: #8a5a5a; }
    input[type="number"] {
      width: 80px;
      background: #2d2d44;
      color: #fff;
    }
    label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .canvas-container {
      background: #2d2d44;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
    }
    .stats {
      display: flex;
      gap: 2rem;
      font-size: 0.9rem;
      color: #aaa;
      flex-wrap: wrap;
      justify-content: center;
    }
    .stats span { color: #fff; }
    .legend {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: #888;
      text-align: center;
    }
    .error {
      color: #e74c3c;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <h1>🌊 wfc-ts Visualizer</h1>
  
  <div class="controls">
    <label>
      Tileset:
      <select id="tileset">
        <option value="Knots">Knots</option>
        <option value="Circuit">Circuit</option>
        <option value="Rooms">Rooms</option>
        <option value="Summer">Summer (game)</option>
      </select>
    </label>
    <label>
      Size:
      <select id="size">
        <option value="12">12×12</option>
        <option value="24" selected>24×24</option>
        <option value="32">32×32</option>
        <option value="48">48×48</option>
      </select>
    </label>
    <label>
      Seed:
      <input type="number" id="seed" value="12345" min="0">
    </label>
    <label>
      Periodic:
      <input type="checkbox" id="periodic" checked>
    </label>
  </div>
  
  <div class="controls">
    <label>
      Speed:
      <select id="speed">
        <option value="1">Slow (1/step)</option>
        <option value="10" selected>Medium (10/step)</option>
        <option value="50">Fast (50/step)</option>
        <option value="0">Instant</option>
      </select>
    </label>
    <button id="start" class="primary">▶ Start</button>
    <button id="stop" class="danger" disabled>⏹ Stop</button>
    <button id="reset">🔄 Reset</button>
    <button id="random">🎲 Random Seed</button>
    <button id="compare">📊 Compare with mxgmn</button>
  </div>
  
  <div style="display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;">
    <div class="canvas-container">
      <div style="text-align: center; margin-bottom: 0.5rem; font-size: 0.9rem;">wfc-ts (ours)</div>
      <canvas id="canvas" width="480" height="480"></canvas>
    </div>
    <div class="canvas-container" id="canonical-container" style="display: none;">
      <div style="text-align: center; margin-bottom: 0.5rem; font-size: 0.9rem;">mxgmn (canonical)</div>
      <img id="canonical-img" style="image-rendering: pixelated;">
    </div>
  </div>
  
  <div class="stats">
    <div>Cells: <span id="cells">0</span> / <span id="total">0</span></div>
    <div>Time: <span id="time">0</span>ms</div>
    <div>Attempt: <span id="attempt">1</span></div>
    <div>Status: <span id="status">Ready</span></div>
  </div>
  
  <div class="legend">
    Tiles are rendered from the actual WFC solver. Gray cells = not yet collapsed.
  </div>
  
  <div id="error" class="error"></div>

  <script type="module">
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    const tilesetSelect = document.getElementById('tileset');
    const sizeSelect = document.getElementById('size');
    const seedInput = document.getElementById('seed');
    const periodicInput = document.getElementById('periodic');
    const speedSelect = document.getElementById('speed');
    const startBtn = document.getElementById('start');
    const stopBtn = document.getElementById('stop');
    const resetBtn = document.getElementById('reset');
    const randomBtn = document.getElementById('random');
    const cellsSpan = document.getElementById('cells');
    const totalSpan = document.getElementById('total');
    const timeSpan = document.getElementById('time');
    const attemptSpan = document.getElementById('attempt');
    const statusSpan = document.getElementById('status');
    const errorDiv = document.getElementById('error');
    
    let running = false;
    let abortController = null;
    let tilesetInfo = null;
    let tileImages = {}; // { tilesetName: { tileName: Image } }
    let currentResult = null;
    let gridSize = 24;
    let tileSize = 10; // Tile size in the tileset images
    
    // Load tileset info from server
    async function loadTilesetInfo() {
      try {
        const res = await fetch('/api/tilesets');
        tilesetInfo = await res.json();
        console.log('Loaded tileset info:', tilesetInfo);
      } catch (e) {
        errorDiv.textContent = `Failed to load tilesets: ${e.message}. Make sure the server is running (bun run viz/server.ts)`;
        throw e;
      }
    }
    
    // Load tile images for a tileset
    async function loadTileImages(tilesetName) {
      if (tileImages[tilesetName]) return tileImages[tilesetName];
      
      const info = tilesetInfo[tilesetName];
      const images = {};
      const isUnique = info.unique;
      
      if (isUnique) {
        // For unique tilesets, load each pre-rotated image by full tilename
        const fullNames = info.tiles.map((t, i) => `${t.name} ${t.rotation}`);
        const uniqueFullNames = [...new Set(fullNames)];
        
        await Promise.all(uniqueFullNames.map(fullName => {
          return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
              images[fullName] = img;
              tileSize = img.width;
              resolve();
            };
            img.onerror = () => {
              console.warn(`Failed to load tile: ${fullName}`);
              resolve();
            };
            img.src = `/tiles/${tilesetName}/${fullName}.png`;
          });
        }));
      } else {
        // For non-unique tilesets, load base images only
        const uniqueNames = [...new Set(info.tiles.map(t => t.name))];
        
        await Promise.all(uniqueNames.map(name => {
          return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
              images[name] = img;
              tileSize = img.width;
              resolve();
            };
            img.onerror = () => {
              console.warn(`Failed to load tile: ${name}`);
              resolve();
            };
            img.src = `/tiles/${tilesetName}/${name}.png`;
          });
        }));
      }
      
      tileImages[tilesetName] = images;
      return images;
    }
    
    // Initialize display
    async function initDisplay() {
      gridSize = parseInt(sizeSelect.value);
      const tilesetName = tilesetSelect.value;
      
      await loadTileImages(tilesetName);
      
      // Calculate canvas size
      const scale = Math.max(1, Math.floor(480 / (gridSize * tileSize)));
      const displayTileSize = tileSize * scale;
      canvas.width = gridSize * displayTileSize;
      canvas.height = gridSize * displayTileSize;
      
      currentResult = new Array(gridSize * gridSize).fill(-1);
      totalSpan.textContent = gridSize * gridSize;
      cellsSpan.textContent = '0';
      timeSpan.textContent = '0';
      attemptSpan.textContent = '1';
      statusSpan.textContent = 'Ready';
      errorDiv.textContent = '';
      
      render();
    }
    
    // Render the current state
    function render() {
      const tilesetName = tilesetSelect.value;
      const images = tileImages[tilesetName] || {};
      const info = tilesetInfo?.[tilesetName];
      
      const scale = Math.max(1, Math.floor(480 / (gridSize * tileSize)));
      const displayTileSize = tileSize * scale;
      
      ctx.fillStyle = '#3a3a5a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      for (let y = 0; y < gridSize; y++) {
        for (let x = 0; x < gridSize; x++) {
          const i = x + y * gridSize;
          const tileIdx = currentResult?.[i] ?? -1;
          
          const dx = x * displayTileSize;
          const dy = y * displayTileSize;
          
          if (tileIdx >= 0 && info && info.tiles[tileIdx]) {
            const tile = info.tiles[tileIdx];
            const isUnique = info.unique;
            
            // For unique tilesets, use full name; for others, use base name
            const imgKey = isUnique ? `${tile.name} ${tile.rotation}` : tile.name;
            const img = images[imgKey];
            
            if (img) {
              if (isUnique) {
                // Pre-rotated images: draw directly
                ctx.drawImage(img, dx, dy, displayTileSize, displayTileSize);
              } else {
                // Apply rotation for non-unique tilesets
                ctx.save();
                ctx.translate(dx + displayTileSize / 2, dy + displayTileSize / 2);
                // mxgmn rotates CCW, canvas rotates CW for positive angles, so negate
                ctx.rotate(-(tile.rotation * Math.PI) / 2);
                ctx.drawImage(img, -displayTileSize / 2, -displayTileSize / 2, displayTileSize, displayTileSize);
                ctx.restore();
              }
            } else {
              // Fallback: colored square
              ctx.fillStyle = `hsl(${(tileIdx * 37) % 360}, 60%, 50%)`;
              ctx.fillRect(dx, dy, displayTileSize - 1, displayTileSize - 1);
            }
          } else {
            // Not collapsed: gray
            ctx.fillStyle = '#2a2a3a';
            ctx.fillRect(dx, dy, displayTileSize - 1, displayTileSize - 1);
          }
        }
      }
    }
    
    // Run solver (streaming or instant)
    async function run() {
      running = true;
      startBtn.disabled = true;
      stopBtn.disabled = false;
      statusSpan.textContent = 'Running...';
      errorDiv.textContent = '';
      
      await initDisplay();
      
      const tilesetName = tilesetSelect.value;
      const width = gridSize;
      const height = gridSize;
      const seed = parseInt(seedInput.value) || 12345;
      const periodic = periodicInput.checked;
      const speed = parseInt(speedSelect.value);
      
      abortController = new AbortController();
      
      try {
        if (speed === 0) {
          // Instant mode
          const res = await fetch(`/api/solve-instant?tileset=${tilesetName}&width=${width}&height=${height}&seed=${seed}&periodic=${periodic}`, {
            signal: abortController.signal,
          });
          const data = await res.json();
          
          if (data.error) throw new Error(data.error);
          
          currentResult = data.result || [];
          cellsSpan.textContent = data.complete ? width * height : '?';
          timeSpan.textContent = data.elapsed.toFixed(1);
          statusSpan.textContent = data.complete ? '✓ Complete!' : '✗ Failed';
          render();
        } else {
          // Streaming mode
          const yieldEvery = speed;
          const res = await fetch(`/api/solve?tileset=${tilesetName}&width=${width}&height=${height}&seed=${seed}&periodic=${periodic}&yieldEvery=${yieldEvery}`, {
            signal: abortController.signal,
          });
          
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';
          
          while (running) {
            const { done, value } = await reader.read();
            if (done) break;
            
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n\n');
            buffer = lines.pop() || '';
            
            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              const data = JSON.parse(line.slice(6));
              
              if (data.error) {
                throw new Error(data.error);
              }
              
              if (data.cellsResolved !== undefined) {
                cellsSpan.textContent = data.cellsResolved;
              }
              if (data.elapsed !== undefined) {
                timeSpan.textContent = data.elapsed.toFixed(1);
              }
              if (data.attempt !== undefined) {
                attemptSpan.textContent = data.attempt + 1;
              }
              
              // Update result on every message
              if (data.result) {
                currentResult = data.result;
              }
              
              if (data.done) {
                statusSpan.textContent = data.ok && data.complete ? '✓ Complete!' : '✗ Failed';
                running = false;
              }
              
              render();
              
              // Small delay for animation
              if (!data.done && speed <= 10) {
                await new Promise(r => setTimeout(r, 10));
              }
            }
          }
        }
      } catch (e) {
        if (e.name !== 'AbortError') {
          errorDiv.textContent = `Error: ${e.message}`;
          statusSpan.textContent = '✗ Error';
        }
      }
      
      running = false;
      startBtn.disabled = false;
      stopBtn.disabled = true;
    }
    
    function stop() {
      running = false;
      if (abortController) {
        abortController.abort();
        abortController = null;
      }
      startBtn.disabled = false;
      stopBtn.disabled = true;
      statusSpan.textContent = 'Stopped';
    }
    
    function reset() {
      stop();
      currentResult = null;
      initDisplay();
    }
    
    function randomSeed() {
      seedInput.value = Math.floor(Math.random() * 1000000);
    }
    
    startBtn.addEventListener('click', run);
    stopBtn.addEventListener('click', stop);
    resetBtn.addEventListener('click', reset);
    randomBtn.addEventListener('click', randomSeed);
    sizeSelect.addEventListener('change', reset);
    tilesetSelect.addEventListener('change', reset);
    
    const compareBtn = document.getElementById('compare');
    const canonicalContainer = document.getElementById('canonical-container');
    const canonicalImg = document.getElementById('canonical-img');
    
    compareBtn.addEventListener('click', async () => {
      compareBtn.disabled = true;
      compareBtn.textContent = '⏳ Running mxgmn...';
      canonicalContainer.style.display = 'block';
      
      const tilesetName = tilesetSelect.value;
      const width = gridSize;
      const height = gridSize;
      const seed = parseInt(seedInput.value) || 12345;
      const periodic = periodicInput.checked;
      
      // Map tileset to subset (for comparison)
      const subsets = { Knots: 'Standard', Circuit: 'Turnless', Rooms: null, Summer: null };
      const subset = subsets[tilesetName];
      
      // Summer doesn't work with periodic boundaries and struggles at larger sizes
      const canonicalPeriodic = tilesetName === 'Summer' ? false : periodic;
      const canonicalWidth = tilesetName === 'Summer' ? Math.min(width, 16) : width;
      const canonicalHeight = tilesetName === 'Summer' ? Math.min(height, 16) : height;
      const subsetParam = subset ? `&subset=${subset}` : '';
      
      try {
        const res = await fetch(`/api/canonical?tileset=${tilesetName}&width=${canonicalWidth}&height=${canonicalHeight}&seed=${seed}&periodic=${canonicalPeriodic}${subsetParam}`);
        if (res.ok) {
          const blob = await res.blob();
          canonicalImg.src = URL.createObjectURL(blob);
          canonicalImg.style.width = canvas.width + 'px';
          canonicalImg.style.height = canvas.height + 'px';
        } else {
          const err = await res.json();
          errorDiv.textContent = `Canonical error: ${err.error}`;
        }
      } catch (e) {
        errorDiv.textContent = `Canonical error: ${e.message}`;
      }
      
      compareBtn.disabled = false;
      compareBtn.textContent = '📊 Compare with mxgmn';
    });
    
    // Initialize
    loadTilesetInfo().then(initDisplay).catch(console.error);
  </script>
</body>
</html>
